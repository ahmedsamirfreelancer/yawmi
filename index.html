<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1F3A5F">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ورقة اليوم">
<title>ورقة اليوم</title>
<style>
  :root{
    --navy:#1F3A5F; --navy2:#2c4d75; --gold:#C49A2E; --light:#EFEDE6;
    --bg:#f5f4ef; --card:#ffffff; --line:#e3dfd2; --text:#23303f; --muted:#6b6b6b;
    --ok:#2e7d52; --shadow:0 2px 10px rgba(31,58,95,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:"Segoe UI","Tahoma","Arial",sans-serif;
    background:var(--bg); color:var(--text);
    padding-bottom:90px;
  }
  /* ===== Header ===== */
  header{
    position:sticky; top:0; z-index:20;
    background:var(--navy); color:#fff;
    padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;
    box-shadow:0 2px 12px rgba(0,0,0,.18);
  }
  .h-title{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .h-title h1{font-size:20px;margin:0;font-weight:700;letter-spacing:.3px}
  .h-title h1 b{color:var(--gold)}
  .motto{font-size:12.5px;color:#d7c89a;margin-top:3px;min-height:16px}
  /* date nav */
  .datebar{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px}
  .datebar button{
    background:rgba(255,255,255,.12);color:#fff;border:0;border-radius:10px;
    width:38px;height:38px;font-size:18px;cursor:pointer;flex:0 0 auto
  }
  .datebar button:active{background:rgba(255,255,255,.25)}
  .datebar .date{
    flex:1;text-align:center;background:rgba(255,255,255,.10);
    border-radius:10px;padding:8px 6px;font-size:14px;line-height:1.4
  }
  .datebar .date small{display:block;color:#cdbd8f;font-size:11px}
  .today-btn{background:var(--gold)!important;font-size:12px!important;width:auto!important;padding:0 12px;border-radius:10px}
  /* level tabs */
  .levels{display:flex;gap:6px;margin-top:12px;background:rgba(0,0,0,.18);padding:4px;border-radius:12px}
  .levels button{
    flex:1;border:0;background:transparent;color:#cdd6e2;padding:8px 4px;border-radius:9px;
    font-size:13px;font-weight:600;cursor:pointer;transition:.15s
  }
  .levels button.active{background:var(--gold);color:#1a2230}
  /* progress */
  .progress-wrap{margin-top:13px}
  .pbar{height:9px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden}
  .pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#e6c45e);width:0;transition:width .35s}
  .pmeta{display:flex;justify-content:space-between;font-size:12px;margin-top:6px;color:#d7d2c2}
  .streak{color:var(--gold);font-weight:700}
  /* ===== Sections ===== */
  main{padding:14px 12px 0}
  .section{background:var(--card);border-radius:14px;margin-bottom:13px;box-shadow:var(--shadow);overflow:hidden}
  .sec-head{background:var(--navy);color:#fff;padding:10px 14px;font-size:14.5px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
  .sec-head .cnt{font-size:11.5px;color:#c9d3e0;font-weight:600}
  .items{padding:4px 6px}
  .item{
    display:flex;align-items:center;gap:12px;padding:11px 10px;border-radius:10px;cursor:pointer;
    border-bottom:1px solid var(--line)
  }
  .item:last-child{border-bottom:0}
  .item:active{background:#faf9f4}
  .check{
    width:26px;height:26px;border-radius:8px;border:2px solid #c9c3b2;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;transition:.12s;background:#fff
  }
  .item.done .check{background:var(--ok);border-color:var(--ok)}
  .check svg{width:15px;height:15px;opacity:0;transition:.12s}
  .item.done .check svg{opacity:1}
  .item .lbl{flex:1;font-size:14.5px;line-height:1.35}
  .item .lbl small{display:block;color:var(--muted);font-size:11.5px;margin-top:1px}
  .item.done .lbl{color:var(--muted)}
  .item.done .lbl span{text-decoration:line-through;text-decoration-color:#bbb}
  /* salah pills */
  .pills{display:flex;flex-wrap:wrap;gap:7px;padding:12px 12px 14px}
  .pill{
    border:2px solid #d3cdbc;background:#fff;border-radius:11px;padding:9px 4px;font-size:13.5px;
    text-align:center;cursor:pointer;flex:1 1 0;min-width:54px;font-weight:600;transition:.12s
  }
  .pill.done{background:var(--ok);border-color:var(--ok);color:#fff}
  .pill small{display:block;font-size:9.5px;font-weight:400;opacity:.75;margin-top:2px}
  /* inputs (text / rating / time) */
  .field{padding:10px 12px;border-bottom:1px solid var(--line)}
  .field:last-child{border-bottom:0}
  .field label{display:block;font-size:13px;color:var(--navy);font-weight:600;margin-bottom:6px}
  .field input[type=text],.field input[type=time]{
    width:100%;border:1.5px solid var(--line);border-radius:9px;padding:9px 10px;font-size:14px;
    font-family:inherit;background:#fff;color:var(--text)
  }
  .field input:focus{outline:0;border-color:var(--gold)}
  .topgoals .field input{margin-bottom:0}
  /* rating */
  .rating{display:flex;gap:5px;flex-wrap:wrap;padding:10px 12px}
  .rating b{width:100%;font-size:13px;color:var(--navy);margin-bottom:2px}
  .rdot{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--line);background:#fff;
    font-size:13px;cursor:pointer;color:var(--muted)}
  .rdot.on{background:var(--navy);border-color:var(--navy);color:#fff;font-weight:700}
  /* footer quote */
  .quote{text-align:center;color:var(--navy);padding:6px 0 24px}
  .quote b{display:block;font-size:15px}
  .quote span{color:var(--gold);font-size:13px}
  .quote .di{color:var(--gold);letter-spacing:6px;margin:4px 0;font-size:12px}
  /* install hint */
  .toast{
    position:fixed;left:12px;right:12px;bottom:14px;z-index:40;background:var(--navy);color:#fff;
    border-radius:14px;padding:12px 14px;box-shadow:0 6px 22px rgba(0,0,0,.3);display:none;
    align-items:center;gap:10px;font-size:13.5px
  }
  .toast.show{display:flex}
  .toast button{margin-inline-start:auto;background:var(--gold);border:0;color:#1a2230;font-weight:700;
    border-radius:9px;padding:8px 12px;font-size:13px;cursor:pointer;flex:0 0 auto}
  .toast .x{background:transparent;color:#cdd6e2;padding:6px}
  /* saved flash */
  #flash{position:fixed;top:0;left:0;right:0;height:3px;background:var(--gold);transform:scaleX(0);
    transform-origin:right;transition:.2s;z-index:50}
</style>
</head>
<body>
<div id="flash"></div>
<header>
  <div class="h-title">
    <h1>وَرَقة ال<b>يَوم</b></h1>
    <div style="font-size:12px;color:#cdbd8f">لا أبرح حتى أبلغ</div>
  </div>
  <div class="motto" id="motto"></div>

  <div class="datebar">
    <button id="next" title="التالي">‹</button>
    <div class="date" id="dateLabel" title="رجوع لليوم"></div>
    <button id="prev" title="السابق">›</button>
  </div>

  <div class="levels" id="levels">
    <button data-lvl="0">مبتدئ</button>
    <button data-lvl="1">متوسط</button>
    <button data-lvl="2">متقدم</button>
  </div>

  <div class="progress-wrap">
    <div class="pbar"><i id="pfill"></i></div>
    <div class="pmeta">
      <span id="ppct">0%</span>
      <span class="streak" id="streak">🔥 0 يوم متواصل</span>
    </div>
  </div>
</header>

<main id="app"></main>

<div class="quote">
  <div class="di">❖ ❖ ❖</div>
  <span>قد أتأخر فأسبق الجميع</span>
</div>

<div class="toast" id="installToast">
  <span>ثبّت التطبيق على شاشتك ليفتح زي أي برنامج 📲</span>
  <button id="installBtn">تثبيت</button>
  <button class="x" id="installX">✕</button>
</div>

<script src="app.js"></script>
</body>
</html>
