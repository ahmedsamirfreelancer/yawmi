<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#1F3A5F">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192-v2.png">
<link rel="apple-touch-icon" href="icon-512-v2.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ورقة اليوم">
<title>ورقة اليوم</title>
<link rel="stylesheet" href="fonts.css">
<style>
  :root{
    --navy:#1F3A5F; --gold:#C49A2E; --light:#EFEDE6; --bg:#f5f4ef; --card:#fff;
    --line:#e3dfd2; --text:#23303f; --muted:#6b6b6b; --ok:#2e7d52;
    --shadow:0 2px 10px rgba(31,58,95,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{font-family:'Tajawal',"Segoe UI","Tahoma","Arial",sans-serif;background:var(--bg);color:var(--text)}
  /* النصوص الدينية (الآيات والأذكار) بخط نسخ كلاسيكي */
  .ad-text,.ayah-body{font-family:'Amiri','Tajawal',serif}
  .ad-text{font-size:18.5px;line-height:2.2}
  .ayah-body{font-size:19px;line-height:2.1}
  #root{min-height:100vh}
  #flash{position:fixed;top:0;left:0;right:0;height:3px;background:var(--gold);transform:scaleX(0);transform-origin:right;transition:.2s;z-index:60}

  /* ===== Auth ===== */
  body.auth-mode{background:var(--navy)}
  .auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .auth-card{background:#fff;border-radius:18px;padding:26px 20px;width:100%;max-width:380px;box-shadow:0 12px 40px rgba(0,0,0,.25)}
  .brand{font-size:26px;font-weight:800;color:var(--navy);text-align:center}
  .brand b{color:var(--gold)}
  .brand-sub{text-align:center;color:var(--muted);font-size:13px;margin:4px 0 16px}
  .seg{display:flex;gap:6px;background:var(--light);padding:4px;border-radius:12px;margin-bottom:14px}
  .seg button{flex:1;border:0;background:transparent;color:var(--muted);padding:9px;border-radius:9px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
  .seg button.on{background:var(--navy);color:#fff}
  .seg.lvl button.on{background:var(--gold);color:#1a2230}
  #authForm{display:flex;flex-direction:column;gap:10px}
  #authForm input{border:1.5px solid var(--line);border-radius:11px;padding:12px;font-size:15px;font-family:inherit}
  #authForm input:focus{outline:0;border-color:var(--gold)}
  .lvl-label{font-size:13px;color:var(--navy);font-weight:700;margin-top:2px}
  .primary{background:var(--gold);color:#1a2230;border:0;border-radius:11px;padding:13px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;margin-top:4px}
  .err{color:#c0392b;font-size:13px;text-align:center;min-height:18px}

  /* ===== Header ===== */
  header{position:sticky;top:0;z-index:20;background:var(--navy);color:#fff;padding:calc(env(safe-area-inset-top) + 12px) 14px 12px;box-shadow:0 2px 12px rgba(0,0,0,.18)}
  .h-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .h-title{font-size:20px;font-weight:800}.h-title b{color:var(--gold)}
  .edit-btn{background:rgba(255,255,255,.12);color:#fff;border:0;border-radius:9px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .edit-btn.on{background:var(--gold);color:#1a2230}
  .motto{font-size:12.5px;color:#d7c89a;margin-top:3px;min-height:16px}
  .datebar{display:flex;align-items:center;gap:8px;margin-top:11px}
  .datebar button{background:rgba(255,255,255,.12);color:#fff;border:0;border-radius:10px;width:38px;height:38px;font-size:18px;cursor:pointer;flex:0 0 auto}
  .datebar .date{flex:1;text-align:center;background:rgba(255,255,255,.10);border-radius:10px;padding:7px;font-size:14px;line-height:1.3;cursor:pointer}
  .datebar .date small{display:block;color:#cdbd8f;font-size:11px}
  .pbar{height:8px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden;margin-top:11px}
  .pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#e6c45e);transition:width .35s}
  .pmeta{display:flex;justify-content:space-between;font-size:12px;margin-top:6px;color:#d7d2c2}
  .streak{color:var(--gold);font-weight:700}

  /* ===== Screen / sections ===== */
  main{padding:14px 12px 96px}
  .section{background:var(--card);border-radius:14px;margin-bottom:13px;box-shadow:var(--shadow);overflow:hidden}
  .sec-head{background:var(--navy);color:#fff;padding:10px 14px;font-size:14.5px;font-weight:700;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .sec-head .cnt{font-size:11.5px;color:#c9d3e0;font-weight:600}
  .sec-head .ce{outline:1px dashed rgba(255,255,255,.4);border-radius:4px;padding:1px 6px;min-width:40px}
  .items{padding:4px 6px}
  .item{display:flex;align-items:center;gap:12px;padding:11px 10px;border-radius:10px;cursor:pointer;border-bottom:1px solid var(--line)}
  .item:last-child{border-bottom:0}.item:active{background:#faf9f4}
  .check{width:26px;height:26px;border-radius:8px;border:2px solid #c9c3b2;flex:0 0 auto;display:flex;align-items:center;justify-content:center;background:#fff}
  .item.done .check{background:var(--ok);border-color:var(--ok)}
  .check svg{width:15px;height:15px;opacity:0}.item.done .check svg{opacity:1}
  .item .lbl{flex:1;font-size:14.5px;line-height:1.35}
  .item .lbl small{display:block;color:var(--muted);font-size:11.5px;margin-top:1px}
  .item.done .lbl span{text-decoration:line-through;text-decoration-color:#bbb;color:var(--muted)}
  .pills{display:flex;flex-wrap:wrap;gap:7px;padding:12px}
  .glabel{width:100%;font-size:12px;color:var(--navy);font-weight:700;margin-bottom:2px}
  .pill{border:2px solid #d3cdbc;background:#fff;border-radius:11px;padding:9px 4px;font-size:13.5px;text-align:center;cursor:pointer;flex:1 1 0;min-width:52px;font-weight:600}
  .pill.on{background:var(--ok);border-color:var(--ok);color:#fff}
  .pill small{display:block;font-size:9px;font-weight:400;opacity:.75}
  .field{padding:10px 12px;border-bottom:1px solid var(--line)}.field:last-child{border-bottom:0}
  .field label{display:block;font-size:13px;color:var(--navy);font-weight:600;margin-bottom:6px}
  .field input{width:100%;border:1.5px solid var(--line);border-radius:9px;padding:9px 10px;font-size:14px;font-family:inherit}
  .field input:focus{outline:0;border-color:var(--gold)}
  .frow{display:flex;gap:8px;align-items:center}
  .rating{display:flex;gap:5px;flex-wrap:wrap}
  .rdot{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--line);background:#fff;font-size:13px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center}
  .rdot.on{background:var(--navy);border-color:var(--navy);color:#fff;font-weight:700}
  .ce{outline:1px dashed #c9c3b2;border-radius:4px;padding:1px 5px}
  .del{background:#fbeaea;color:#c0392b;border:0;border-radius:8px;width:30px;height:30px;font-size:14px;cursor:pointer;flex:0 0 auto}
  .add-item{margin:8px;background:var(--light);border:1px dashed #c9c3b2;color:var(--navy);border-radius:9px;padding:9px;width:calc(100% - 16px);font-weight:700;cursor:pointer;font-family:inherit;font-size:13px}
  .add-section{width:100%;background:#fff;border:1px dashed var(--gold);color:var(--navy);border-radius:12px;padding:13px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:13px}

  /* ===== Progress ===== */
  .stats{display:flex;gap:10px;margin-bottom:13px}
  .stat{flex:1;background:var(--card);border-radius:13px;padding:14px 6px;text-align:center;box-shadow:var(--shadow)}
  .stat b{display:block;font-size:22px;color:var(--navy)}.stat span{font-size:11.5px;color:var(--muted)}
  .cal-wd{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:10px 12px 0;text-align:center;font-size:11px;color:var(--muted)}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:8px 12px 12px}
  .cal-cell{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;background:#f0eee7;color:#9a958a}
  .cal-cell.empty{background:transparent}
  .c-h{background:var(--ok)!important;color:#fff!important}.c-m{background:#7bb89a!important;color:#fff!important}
  .c-l{background:#d9c48a!important;color:#5a4d22!important}.c-z{background:#ead9d6!important;color:#a06b63!important}
  .legend{display:flex;align-items:center;gap:6px;justify-content:center;font-size:11px;color:var(--muted);padding:0 12px 12px}
  .legend span{width:14px;height:14px;border-radius:4px;display:inline-block;margin-inline-start:6px}

  /* ===== Tools/Soon ===== */
  .soon{text-align:center;padding:50px 20px;color:var(--muted)}.soon-ic{font-size:44px}.soon p{font-size:14px;line-height:1.7}
  .soon-list{padding:10px 14px;display:flex;flex-direction:column;gap:10px;color:var(--text);font-size:14px}
  .acct{padding:6px 14px 14px}
  .acct-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px}
  .acct-row span{color:var(--muted)}
  .logout{margin-top:14px;width:100%;background:#fbeaea;color:#c0392b;border:0;border-radius:11px;padding:12px;font-weight:800;cursor:pointer;font-family:inherit;font-size:14px}
  .credit{text-align:center;color:var(--muted);font-size:13px;padding:8px 0 10px}

  /* ===== Prayer strip ===== */
  .psrip{background:linear-gradient(135deg,#24426e,#1a3055);color:#fff;border-radius:14px;padding:12px;margin-bottom:13px;box-shadow:var(--shadow)}
  .psrip.locate{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13.5px}
  .psrip.locate button{background:var(--gold);color:#1a2230;border:0;border-radius:9px;padding:8px 12px;font-weight:800;cursor:pointer;font-family:inherit;font-size:13px;flex:0 0 auto}
  .pcells{display:flex;gap:5px}
  .pcell{flex:1;text-align:center;background:rgba(255,255,255,.08);border-radius:9px;padding:7px 2px}
  .pcell span{display:block;font-size:11px;color:#cdd6e2}.pcell b{font-size:12.5px;font-weight:700}
  .pcell.nx{background:var(--gold);color:#1a2230}.pcell.nx span{color:#5a4d22}
  .pnext{text-align:center;font-size:12px;color:#d7c89a;margin-top:9px;font-weight:600}
  /* settings */
  .setbox{padding:10px 14px 14px}
  .setlbl{display:block;font-size:12.5px;color:var(--navy);font-weight:700;margin:12px 0 5px}
  .setbox select{width:100%;border:1.5px solid var(--line);border-radius:9px;padding:10px;font-size:14px;font-family:inherit;background:#fff}
  .seg.sm{margin:0}.seg.sm button{padding:8px;font-size:13px}
  .mini{background:var(--navy);color:#fff;border:0;border-radius:9px;padding:9px 14px;font-weight:700;cursor:pointer;font-family:inherit;font-size:13px;margin-top:8px}
  .mini.ghost{background:#fff;color:var(--navy);border:1.5px solid var(--navy);margin-top:10px;width:100%}
  .offs{display:flex;gap:6px}
  .off{flex:1;text-align:center}.off span{display:block;font-size:11px;color:var(--muted);margin-bottom:3px}
  .off input{width:100%;border:1.5px solid var(--line);border-radius:8px;padding:7px 2px;text-align:center;font-size:13px;font-family:inherit}
  .sw{position:relative;display:inline-block;width:46px;height:26px}
  .sw input{opacity:0;width:0;height:0}
  .sw i{position:absolute;inset:0;background:#cfc9bb;border-radius:99px;transition:.2s}
  .sw i:before{content:"";position:absolute;width:20px;height:20px;right:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
  .sw input:checked + i{background:var(--ok)}
  .sw input:checked + i:before{transform:translateX(-20px)}

  /* ===== Tabs ===== */
  #tabs{position:fixed;bottom:0;left:0;right:0;z-index:30;display:flex;background:#fff;border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
  #tabs button{flex:1;border:0;background:transparent;color:var(--muted);padding:9px 0 8px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px}
  #tabs button span{font-size:20px;filter:grayscale(1);opacity:.6}
  #tabs button.on{color:var(--navy)}#tabs button.on span{filter:none;opacity:1}

  /* ===== القرآن ===== */
  .qcard{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:14px;padding:16px 14px;margin-bottom:13px;box-shadow:var(--shadow);cursor:pointer}
  .qcard:active{background:#faf9f4}
  .qcard-ic{font-size:30px;flex:0 0 auto}
  .qcard-body{flex:1}.qcard-body b{display:block;font-size:15.5px;color:var(--navy)}.qcard-body span{font-size:12.5px;color:var(--muted)}
  .qcard-go{font-size:24px;color:var(--gold)}
  .qnote{text-align:center;color:var(--muted);font-size:12.5px;padding:6px}
  .qexplain{font-size:13px;color:var(--muted);line-height:1.7;margin:0 0 6px}
  .stepper{display:flex;align-items:center;gap:14px;justify-content:center;margin:6px 0}
  .stepper button{width:42px;height:42px;border-radius:11px;border:0;background:var(--navy);color:#fff;font-size:22px;cursor:pointer;font-family:inherit}
  .stepper b{font-size:20px;min-width:90px;text-align:center;color:var(--navy)}
  .jchips{padding:12px;display:flex;flex-wrap:wrap;gap:7px}
  .jchip{color:#fff;border-radius:9px;padding:6px 11px;font-size:12.5px;font-weight:700}
  .jgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:10px}
  .jcell{aspect-ratio:1;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;cursor:pointer}
  .rlegend{display:flex;flex-wrap:wrap;gap:10px;font-size:11.5px;color:var(--muted);margin:4px 0}
  .rlegend span{display:flex;align-items:center;gap:4px}.rlegend i{width:13px;height:13px;border-radius:4px;display:inline-block}

  /* ===== أدوات ===== */
  .tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:13px}
  .ttile{background:var(--card);border:0;border-radius:14px;padding:16px 6px;box-shadow:var(--shadow);cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;color:var(--navy);display:flex;flex-direction:column;align-items:center;gap:7px}
  .ttile span{font-size:26px}
  .ayah{background:linear-gradient(135deg,#24426e,#1a3055);color:#fff;border-radius:14px;padding:16px;margin-bottom:13px;box-shadow:var(--shadow);text-align:center}
  .ayah-tag{font-size:12px;color:var(--gold);font-weight:700}
  .ayah-body{font-size:17px;line-height:1.9;margin:8px 0;font-weight:600}
  .ayah-src{font-size:12px;color:#cdd6e2}
  .pomo{padding:20px 14px;text-align:center}
  .pomo-phase{font-size:14px;color:var(--gold);font-weight:700}
  .pomo-time{font-size:58px;font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums;letter-spacing:2px;margin:6px 0}
  .pomo-task{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px;font-size:14px;font-family:inherit;margin-bottom:14px;text-align:center}
  .pomo-btns{display:flex;flex-direction:column;gap:9px}.pomo-btns .primary{width:100%}
  .tasbih{text-align:center;padding:14px}
  .ts-count{font-size:64px;font-weight:800;color:var(--navy);font-variant-numeric:tabular-nums}
  .ts-target{font-size:13px;color:var(--muted);margin-bottom:18px}
  .ts-btn{width:190px;height:190px;border-radius:50%;border:0;background:radial-gradient(circle at 40% 35%,#2a4a78,#1a3055);color:#fff;font-size:22px;font-weight:800;cursor:pointer;font-family:inherit;box-shadow:0 8px 24px rgba(31,58,95,.3)}
  .ts-btn:active{transform:scale(.96)}
  .qibla{text-align:center;padding:18px 14px}
  .compass{position:relative;width:230px;height:230px;border-radius:50%;border:3px solid var(--navy);margin:0 auto 16px;background:radial-gradient(circle,#fff,#f1efe8)}
  .c-needle{position:absolute;inset:0;display:flex;align-items:flex-start;justify-content:center;font-size:42px;padding-top:8px;transition:transform .15s ease-out}
  .compass .c-n,.compass .c-s,.compass .c-e,.compass .c-w{position:absolute;font-size:12px;color:var(--muted);font-weight:700}
  .c-n{top:6px;left:50%;transform:translateX(-50%)}.c-s{bottom:6px;left:50%;transform:translateX(-50%)}
  .c-e{right:8px;top:50%;transform:translateY(-50%)}.c-w{left:8px;top:50%;transform:translateY(-50%)}
  .q-deg{font-size:16px;color:var(--navy)}.q-deg b{color:var(--gold)}
  .q-hint{font-size:13px;color:var(--muted);margin-top:8px}
  .rem-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)}
  .rem-row:last-child{border-bottom:0}.rem-row span{font-size:14px}
  .rem-row input{border:1.5px solid var(--line);border-radius:9px;padding:7px 10px;font-family:inherit;font-size:14px}
  .link{background:none;border:0;color:var(--gold);font-size:13px;cursor:pointer;font-family:inherit;text-decoration:underline;padding:4px}
  .rec-fields{display:flex;flex-direction:column;gap:10px}

  /* ===== أهداف اليوم القابلة للضغط ===== */
  .goal{display:flex;align-items:center;gap:11px;padding:11px 10px;border-bottom:1px solid var(--line)}
  .goal:last-child{border-bottom:0}
  .goal .check{cursor:pointer}
  .goal.done .check{background:var(--ok);border-color:var(--ok)}
  .goal.done .check svg{opacity:1}
  .goal-inp{flex:1;border:0;background:transparent;font-family:inherit;font-size:14.5px;padding:4px 2px;color:var(--text);border-bottom:1px dashed transparent}
  .goal-inp:focus{outline:0;border-bottom-color:var(--gold)}
  .goal.done .goal-inp{text-decoration:line-through;text-decoration-color:#bbb;color:var(--muted)}
  .add-item[data-addgoal]{border-color:var(--gold);color:var(--navy)}
  /* ===== ستيبر صغير (دقائق الأذان/البومودورو) ===== */
  .ministep{display:inline-flex;align-items:center;gap:8px}
  .ministep button{width:30px;height:30px;border-radius:8px;border:0;background:var(--navy);color:#fff;font-size:18px;line-height:1;cursor:pointer;font-family:inherit}
  .ministep b{min-width:26px;text-align:center;font-size:15px;color:var(--navy)}
  .off .ministep{justify-content:center}
  .pomo-cur{font-size:13px;color:var(--gold);font-weight:700;margin-bottom:12px;min-height:18px}
  #pTaskSel{width:100%;border:1.5px solid var(--line);border-radius:9px;padding:10px;font-size:14px;font-family:inherit;background:#fff}

  /* ===== لائحة أصوات الأذان ===== */
  .adhan-list{display:flex;flex-direction:column;gap:6px;margin-top:4px}
  .adhan-row{display:flex;align-items:center;justify-content:space-between;gap:8px;border:1.5px solid var(--line);border-radius:10px;padding:9px 12px;cursor:pointer}
  .adhan-row.sel{border-color:var(--ok);background:#f0f8f3}
  .adhan-name{font-size:14px;font-weight:600}
  .adhan-row.sel .adhan-name:after{content:" ✓";color:var(--ok)}
  .adhan-prev{background:var(--navy);color:#fff;border:0;border-radius:8px;width:38px;height:34px;font-size:15px;cursor:pointer;flex:0 0 auto}
  .rem-ctl{display:flex;align-items:center;gap:10px}
  .rem-ctl input[type=time]{border:1.5px solid var(--line);border-radius:8px;padding:6px 8px;font-family:inherit;font-size:13px;width:108px}
  .rem-row span small{display:block;font-size:11px;color:var(--muted);margin-top:2px}
  .ttile.big{grid-column:1 / -1;flex-direction:row;justify-content:center;gap:10px;background:linear-gradient(135deg,#24426e,#1a3055);color:#fff}
  .ttile.big span{font-size:24px}

  /* ===== شاشة الأذكار ===== */
  .ad-prog{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .ad-prog-bar{flex:1;height:9px;background:#e6e3d8;border-radius:99px;overflow:hidden}
  .ad-prog-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--ok),#5bbd8a);transition:width .3s}
  .ad-prog span{font-size:12px;color:var(--muted);font-weight:600}
  .ad-card{background:var(--card);border-radius:14px;padding:16px 14px;margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;border:2px solid transparent;transition:.15s}
  .ad-card:active{transform:scale(.99)}
  .ad-card.done{border-color:var(--ok);background:#f6fbf8}
  .ad-text{font-size:17px;line-height:2.1;color:var(--text);font-weight:600}
  .ad-count{display:flex;align-items:center;gap:10px;margin-top:12px}
  .ad-ring{display:inline-flex;align-items:center;justify-content:center;min-width:60px;height:60px;border-radius:50%;font-size:17px;font-weight:800;color:#fff;background:var(--navy);box-shadow:0 3px 10px rgba(31,58,95,.25)}
  .ad-count small{font-size:12px;color:var(--muted)}
  .ad-card.done .ad-ring{background:var(--ok)}
  .ad-once{font-size:14px;font-weight:700;color:var(--muted);border:1.5px dashed var(--line);border-radius:10px;padding:8px 14px}
  .ad-once.on{color:var(--ok);border-color:var(--ok);border-style:solid}
  .ad-info{margin-top:12px;background:var(--light);border:0;color:var(--navy);border-radius:9px;padding:8px 12px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit}
  .ad-detail{margin-top:10px;background:#faf9f4;border-radius:10px;padding:12px;font-size:13px;line-height:1.8;color:var(--text)}
  .ad-detail b{color:var(--navy)}
  .ad-reset{display:block;margin-top:10px;background:#fbeaea;color:#c0392b;border:0;border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;font-family:inherit}
</style>
